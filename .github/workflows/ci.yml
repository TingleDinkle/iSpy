name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -r requirements-dev.txt
      - run: python -m pytest tests -q
        env:
          APPSTORESPY_API_KEY: test-key-not-real
          DATABASE_URL: postgresql+psycopg://tracker:tracker@localhost:5432/ci_placeholder
